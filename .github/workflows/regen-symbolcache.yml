name: Regenerate symbol cache

# Daily incremental symbol-cache regeneration.
#
# Clones the latest JuliaWorkspaces.jl and runs its
# scripts/regen_symbolcache.sh against the Cloudflare R2 bucket. In
# incremental mode the script downloads the existing index + tombstones from
# R2, skips everything already cached, and only indexes genuinely new package
# versions -- so the daily cost stays bounded once the cache is seeded.
#
# The sweep is split into sequential segments (jwcloudindex --shard k/n, a
# deterministic hash partition of the version set), one matrix job each. The
# regen script only uploads after a completed sweep, and runner pods have been
# reaped from outside mid-run (recycling/drain, observed 5-11h in), which used
# to lose an entire night's work -- with segments, each slice is uploaded
# before the next starts, and a killed pod costs at most one segment.
#
# Runs on a self-hosted runner (label: cloudindexer). See
# docs/self-hosted-runner.md for runner prerequisites and setup.

on:
  schedule:
    # 03:00 UTC daily.
    - cron: "0 3 * * *"
  workflow_dispatch:
    inputs:
      mode:
        description: "Regen mode"
        type: choice
        default: incremental
        options:
          - incremental
          - full
      jobs:
        description: "Max concurrent sweep workers (auto-capped to 8 if container memory limits aren't enforced)"
        type: string
        default: "12"
      sweep_args:
        description: "Extra args forwarded to the sweep (jwcloudindex), after --"
        type: string
        default: "--newest 3"
      shards:
        description: "Number of sequential sweep segments; each uploads its results before the next starts"
        type: string
        default: "10"

# Single-flight: the regen script assumes the scheduler serializes runs.
concurrency:
  group: regen-symbolcache
  cancel-in-progress: false

permissions:
  contents: read

jobs:
  plan:
    # Tiny setup job: expands the `shards` count into the JSON list the matrix
    # below needs (workflow expressions can't generate ranges).
    runs-on:
      group: cloudindexer-self-hosted-32vcpu-64gb
    timeout-minutes: 15
    env:
      SHARDS: ${{ inputs.shards || '10' }}
    outputs:
      list: ${{ steps.gen.outputs.list }}
      total: ${{ steps.gen.outputs.total }}
    steps:
      - name: Generate shard list
        id: gen
        run: |
          set -euo pipefail
          if ! [[ "$SHARDS" =~ ^[0-9]+$ ]] || (( SHARDS < 1 || SHARDS > 64 )); then
            echo "Invalid shards count '$SHARDS' (need an integer in 1..64)" >&2
            exit 1
          fi
          echo "total=$SHARDS" >> "$GITHUB_OUTPUT"
          echo "list=[$(seq -s, 0 $((SHARDS - 1)))]" >> "$GITHUB_OUTPUT"
          echo "Sweeping in $SHARDS sequential segments"

  regen:
    needs: plan
    # One sweep segment per matrix job, strictly sequential. Sequencing
    # matters twice over: the regen script assumes single-flight access to the
    # bucket, and each segment downloads an index that already contains the
    # previous segments' uploads. fail-fast stays off so one reaped pod only
    # costs its own segment -- the slice is retried by the next incremental
    # run. Every job gets a fresh runner pod, which also resets whatever
    # lifetime clock the cluster applies to pods.
    strategy:
      matrix:
        shard: ${{ fromJSON(needs.plan.outputs.list) }}
      max-parallel: 1
      fail-fast: false
    # Org-wide self-hosted runner group (32 vCPU / 64 GB).
    runs-on:
      group: cloudindexer-self-hosted-32vcpu-64gb
    # Per segment; a hanging segment shouldn't stall the queue for a day.
    timeout-minutes: 720
    env:
      SHARD: ${{ matrix.shard }}
      SHARD_TOTAL: ${{ needs.plan.outputs.total }}
      JW_REF: main
      R2_BUCKET: ${{ vars.R2_BUCKET || 'symbolcache' }}
      REGEN_MODE: ${{ inputs.mode || 'incremental' }}
      SWEEP_ARGS: ${{ inputs.sweep_args || '--newest 3' }}
      # Requested worker concurrency. Each worker container is capped at
      # --cpus=2 --memory=4g, so the 32-vCPU / 64-GB runner fits ~16; 12 leaves
      # headroom for the host + driver. The preflight step lowers this to 8 if
      # those container memory limits aren't actually enforced (rootless / DinD
      # without cgroup delegation): workers still self-limit their GC via
      # JULIA_HEAP_SIZE_HINT below, so a moderate cap suffices (it used to be 2
      # before the heap hint existed).
      JOBS: ${{ inputs.jobs || '12' }}
      # Worker containers forward this (name-only -e in JuliaWorkspaces'
      # run_cloudindex_docker.sh), so each worker's GC targets ~3 GiB even when
      # the docker --memory=4g cap doesn't bind (rootless / DinD without cgroup
      # delegation) and Julia would otherwise size its heap against the whole
      # node. The driver julia sees the same hint, which is fine -- it stays
      # well under 3 GiB.
      JULIA_HEAP_SIZE_HINT: "3G"
      # Define the rclone `r2:` remote via env vars instead of a config file --
      # rclone reads RCLONE_CONFIG_<NAME>_<KEY> for a remote named <NAME>.
      RCLONE_CONFIG_R2_TYPE: s3
      RCLONE_CONFIG_R2_PROVIDER: Cloudflare
      RCLONE_CONFIG_R2_ACCESS_KEY_ID: ${{ secrets.R2_ACCESS_KEY_ID }}
      RCLONE_CONFIG_R2_SECRET_ACCESS_KEY: ${{ secrets.R2_SECRET_ACCESS_KEY }}
      RCLONE_CONFIG_R2_ENDPOINT: https://${{ secrets.R2_ACCOUNT_ID }}.r2.cloudflarestorage.com
      RCLONE_CONFIG_R2_REGION: auto
      # R2 has no bucket-region concept and rclone may lack CreateBucket perms.
      RCLONE_CONFIG_R2_NO_CHECK_BUCKET: "true"
      RCLONE_CONFIG_R2_ACL: private
    steps:
      # For scripts/memdiag.sh; previous runs didn't need the repo itself.
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Clone latest JuliaWorkspaces.jl
        run: |
          set -euo pipefail
          rm -rf JuliaWorkspaces.jl
          git clone --depth 1 --branch "$JW_REF" \
            https://github.com/julia-vscode/JuliaWorkspaces.jl.git JuliaWorkspaces.jl
          echo "JW_DIR=$PWD/JuliaWorkspaces.jl" >> "$GITHUB_ENV"

      - name: Set up Julia
        uses: julia-actions/setup-julia@v2
        with:
          # Matches the checked-in Manifest (julia_version = 1.12.5).
          version: "1.12"

      - name: Install rclone and jq
        run: |
          set -euo pipefail
          # rclone from apt needs >= 1.59 for `provider = Cloudflare` (Ubuntu
          # 24.04 / Debian 12 are fine; older releases ship 1.53).
          export DEBIAN_FRONTEND=noninteractive
          sudo apt-get update -qq
          sudo apt-get install -y --no-install-recommends rclone jq
          rclone version
          jq --version

      - name: Verify R2 credentials are set
        env:
          R2_ACCESS_KEY_ID: ${{ secrets.R2_ACCESS_KEY_ID }}
          R2_SECRET_ACCESS_KEY: ${{ secrets.R2_SECRET_ACCESS_KEY }}
          R2_ACCOUNT_ID: ${{ secrets.R2_ACCOUNT_ID }}
        run: |
          set -euo pipefail
          if [[ -z "${R2_ACCESS_KEY_ID:-}" || -z "${R2_SECRET_ACCESS_KEY:-}" || -z "${R2_ACCOUNT_ID:-}" ]]; then
            echo "Missing R2 secrets (R2_ACCESS_KEY_ID / R2_SECRET_ACCESS_KEY / R2_ACCOUNT_ID)" >&2
            exit 1
          fi

      - name: Instantiate package project
        run: |
          set -euo pipefail
          julia --project="$JW_DIR" -e 'using Pkg; Pkg.instantiate()'

      - name: Preflight - verify container resource limits
        run: |
          set -uo pipefail
          echo "== docker info =="
          docker info --format 'CgroupVersion={{.CgroupVersion}} CgroupDriver={{.CgroupDriver}}' || true
          docker info 2>&1 | grep -iE 'rootless|warning|no (cpu|memory|pids)' || true

          echo "== memory-limit canary =="
          # Start a container capped at 64 MiB and read back the effective limit.
          # cgroup v2 exposes memory.max; v1 exposes memory/memory.limit_in_bytes.
          # If the limit binds we get 67108864; otherwise "max", a huge number,
          # or an error (limit silently ignored / not delegated).
          limit="$(docker run --rm --memory=64m busybox sh -c \
            'cat /sys/fs/cgroup/memory.max 2>/dev/null || cat /sys/fs/cgroup/memory/memory.limit_in_bytes 2>/dev/null || echo unknown')" \
            || limit="error"
          echo "effective memory.max with --memory=64m: $limit (expected 67108864)"

          if [[ "$limit" == "67108864" ]]; then
            echo "Container memory limits ARE enforced; keeping JOBS=$JOBS."
          else
            echo "::warning title=Container memory limits not enforced::--memory did not bind (got '$limit'); capping concurrent workers to 8. Workers still self-limit their GC via JULIA_HEAP_SIZE_HINT (~3 GiB target each)."
            if (( JOBS > 8 )); then
              echo "JOBS=8" >> "$GITHUB_ENV"
              echo "Lowered JOBS from $JOBS to 8."
            else
              echo "Requested JOBS=$JOBS already <= 8; leaving as-is."
            fi
          fi

      - name: Run symbol-cache regen
        run: |
          set -euo pipefail
          echo "mode=$REGEN_MODE remote=r2:$R2_BUCKET jobs=$JOBS shard=$SHARD/$SHARD_TOTAL sweep_args=$SWEEP_ARGS"

          # Sanity-check the concurrency budget against the pod/container
          # cgroup limit: JOBS workers at 4 GiB each, plus ~4 GiB for the
          # driver, dockerd, and the runner agent. Under DinD the workers'
          # memory is charged to this pod's cgroup, so exceeding this means a
          # pod-level OOM kill is likely even though the preflight canary
          # passed for each individual worker.
          limit="$(cat /sys/fs/cgroup/memory.max 2>/dev/null || cat /sys/fs/cgroup/memory/memory.limit_in_bytes 2>/dev/null || echo unknown)"
          if [[ "$limit" =~ ^[0-9]+$ ]]; then
            need=$(( (JOBS * 4 + 4) * 1024 * 1024 * 1024 ))
            echo "cgroup memory limit: $limit bytes; worst-case need: $need bytes (JOBS=$JOBS x 4GiB + 4GiB overhead)"
            if (( need > limit )); then
              echo "::warning title=Worker budget exceeds pod memory limit::JOBS=$JOBS workers at 4GiB each (+4GiB overhead) needs $need bytes but the pod cgroup allows $limit; expect pod-level cgroup OOM kills (CONSTRAINT_MEMCG) under load."
            fi
          else
            echo "cgroup memory limit: $limit — no pod-level cap visible; node-level OOM or kubelet eviction are the relevant risks."
          fi

          # Background monitor sharing this step's stdout: GitHub retains
          # live-streamed lines even when the runner pod dies mid-step, so the
          # snapshots leading up to a termination survive in the run's log.
          chmod +x scripts/memdiag.sh
          scripts/memdiag.sh &
          memdiag_pid=$!

          # Distinguish graceful external termination (kubelet eviction, node
          # drain, and pod deletion deliver SIGTERM) from the OOM killer's
          # untrappable SIGKILL. The regen runs in the background because bash
          # defers trap handlers while a foreground child is running.
          on_signal() {
            echo "::warning title=Regen interrupted::received SIG$1 — graceful external termination (kubelet eviction, node drain/scale-down, pod deletion, or cancellation), not an OOM kill. Check memdiag node_avail: collapsing means eviction, healthy means infra churn."
            echo "$(date -u +%FT%TZ) regen step received SIG$1; node $(grep MemAvailable /proc/meminfo)"
            kill -TERM "$child" 2>/dev/null || true
            kill "$memdiag_pid" 2>/dev/null || true
            exit 143
          }
          trap 'on_signal TERM' TERM
          trap 'on_signal INT' INT

          bash "$JW_DIR/scripts/regen_symbolcache.sh" \
            --remote "r2:$R2_BUCKET" \
            --mode "$REGEN_MODE" \
            -- $SWEEP_ARGS --jobs "$JOBS" --shard "$SHARD/$SHARD_TOTAL" &
          child=$!
          status=0
          wait "$child" || status=$?
          kill "$memdiag_pid" 2>/dev/null || true
          exit "$status"

      - name: Collect memory diagnostics
        if: always()
        run: |
          set -uo pipefail
          echo "== cgroup memory.events (oom_kill > 0 means in-pod cgroup OOM kills) =="
          cat /sys/fs/cgroup/memory.events 2>/dev/null || echo "(cgroup v2 memory.events not available)"
          echo
          echo "== kernel OOM lines (CONSTRAINT_NONE = node OOM, CONSTRAINT_MEMCG = cgroup OOM) =="
          dmesg 2>/dev/null | grep -iE 'invoked oom-killer|oom-kill:|Out of memory' | tail -n 20 || echo "(dmesg not readable from pod)"
